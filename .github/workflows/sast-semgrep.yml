name: SAST - Semgrep Advanced

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Semgrep

      - name: Run Semgrep
  run: |
    semgrep scan \
      --config=auto \
      --config=p/security-audit \
      --config=p/javascript \
      --config=p/php \
      --sarif \
      --output semgrep.sarif

- name: Enrich SARIF
  run: python .github/scripts/remap_semgrep.py

- name: Upload SARIF
  uses: github/codeql-action/upload-sarif@v3
  with:
    sarif_file: semgrep-remapped.sarif
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

     
