name: SAST - Node.js & PHP Security Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: phpstan
      
      - name: Install Node.js dependencies
        run: npm install
        continue-on-error: true
      
      - name: Run ESLint/Security Check
        run: npx eslint vulnerable-app.js --format=json || true
        continue-on-error: true
      
      - name: Run npm audit (Dependencies)
        run: npm audit --json > /tmp/npm-audit.json || true
        continue-on-error: true
      
      - name: Run PHPStan for PHP files
        run: phpstan analyse vulnerable-code.php --level=9 --no-progress || true
        continue-on-error: true
      
      - name: Run Semgrep for JavaScript
        run: |
          pip install semgrep
          semgrep --config=p/javascript --config=p/security-audit vulnerable-app.js --json || true
        continue-on-error: true
      
      - name: Display all results
        run: |
          echo "=== Node.js Security Analysis Complete ==="
          echo "Check Actions logs above for detailed findings"
        continue-on-error: true
