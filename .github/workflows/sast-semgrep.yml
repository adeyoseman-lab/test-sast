name: SAST - PHPStan Security Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  phpstan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: phpstan
      
      - name: Run PHPStan analysis
        run: |
          phpstan analyse --level=9 vulnerable-code.php --no-progress --error-format=json > /tmp/phpstan-results.json
        continue-on-error: true
      
      - name: Display results
        run: cat /tmp/phpstan-results.json || echo "No issues found"
        continue-on-error: true
