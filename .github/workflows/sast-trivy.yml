name: SAST - Trivy Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy.sarif'
      
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3  # ✅ UBAH DARI v2 KE v3
        if: always()
        with:
          sarif_file: 'trivy.sarif'
